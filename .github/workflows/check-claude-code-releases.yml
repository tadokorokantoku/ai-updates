name: Check Claude Code Releases

on:
  schedule:
    # JST 0:00, 6:00, 12:00, 18:00 = UTC 15, 21, 3, 9
    - cron: "0 15,21,3,9 * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  check-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run check-claude-code-releases
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "/check-claude-code-releases"
          claude_args: "--max-turns 80 --allowedTools Bash,Read,Write,Edit,WebFetch,Glob,Grep,Skill"
          show_full_output: true

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/content/
          git diff --staged --quiet || git commit -m "Add new Claude Code release(s) via scheduled check"

          for i in {1..3}; do
            git pull --rebase origin main && git push && break || sleep 5
          done
